# teapot Configuration

[server]
# Domain for generating links - change this to your own domain/ip
address            = "0.0.0.0"
hostname           = "localhost"
httpMaxConnections = 100
https              = false       # Set to true when using HTTPS
port               = 8080
staticDir          = "./public"
title              = "teapot"

[cache]
# Cache TTL settings (in-process cache, no external dependencies)
listMinutes = 240   # How long to cache list info
maxEntries  = 50000 # Cap on in-memory entries; over cap, soonest-expiring are evicted
rssMinutes  = 10    # How long to cache RSS queries

[config]
# Secret key for cryptographic signing of media URLs.
# Generate a unique value for every instance, e.g. with openssl rand -hex 32
hmacKey = ""

# Use base64 encoding for proxied media URLs
base64Media = false

# Enable RSS feeds
enableRSS = true

# Enable debug endpoints (/.health, /.sessions)
enableDebug = false

# Bearer token required for debug endpoints when enableDebug = true.
# Generate a unique value with at least 32 characters.
debugToken = ""

# HTTP/HTTPS proxy (SOCKS proxies not supported)
proxy     = ""
proxyAuth = ""

# API proxy host, e.g. localhost:7000
apiProxy = ""

# Enable this if cookie-based auth is failing
disableTid = false

# Max requests per session to avoid race conditions
maxConcurrentReqs = 2

# Kagi Translate: server-side translation for non-English tweets
# Set either kagiToken (inline) or kagiTokenFile (path to file)
# Get your token from kagi.com/settings → Session Link
kagiToken     = ""
kagiTokenFile = ""

[gifTranscoding]
# Transcode Twitter GIF MP4s to actual GIF format for Discord inline playback
# Modes: "local" (default, ffmpeg on server), "off", "external" (URL rewrite)
mode = "local"
# Cache directory for transcoded GIFs (local mode only)
cacheDir = "./cache/gif"
# Maximum cache size in MB (local mode only)
cacheMaxMb = 512
# External transcoding domain (external mode only, e.g. "gif.example.com")
externalDomain = ""

[preferences]
# Default theme
theme = "teapot"

# URL replacements for privacy
replaceReddit  = ""
replaceTwitter = ""
replaceYouTube = ""

infiniteScroll = false
